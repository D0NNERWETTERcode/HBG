<script>
    const header = document.querySelector('header');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) { header.classList.add('scrolled'); }
        else { header.classList.remove('scrolled'); }
    });
    const navBtn = document.getElementById('nav-x1');
    const mobileMenu = document.getElementById('mobile-menu');
    navBtn.addEventListener('click', () => {
        const isOpen = mobileMenu.classList.toggle('open');
        navBtn.classList.toggle('menu-open', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
    });
    function toggleLangMenu(e) { e.stopPropagation(); document.getElementById('lang-dropdown').classList.toggle('hidden'); }
    document.addEventListener('click', () => { document.getElementById('lang-dropdown').classList.add('hidden'); });
</script>
